# CI — test, coverage, security, gate
# Unified gate runs separately via org ruleset on PRs.

name: CI

on:
  pull_request_target:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:  # manual trigger for testing

# One CI run per branch/PR; cancel stale runs on same branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, clean-room]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --lib

  coverage:
    runs-on: [self-hosted, clean-room]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo install cargo-llvm-cov --locked || true
      - run: cargo llvm-cov test --lib --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked || true
      - run: cargo audit

  gate:
    name: gate
    runs-on: [self-hosted, clean-room]
    if: always()
    needs: [test, coverage, security]
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.test.result }}" = "failure" ] || [ "${{ needs.coverage.result }}" = "failure" ]; then
            exit 1
          fi
